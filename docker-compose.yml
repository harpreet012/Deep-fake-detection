services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: deepfake-backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
    volumes:
      - ./server/uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: deepfake-frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
